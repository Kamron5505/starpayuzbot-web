<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Statistika | StarPayUz</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .stats-container {
            min-height: 100vh;
            padding: 1rem;
            padding-bottom: 100px;
            background: var(--bg-dark);
        }

        .stats-header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .stats-icon {
            font-size: 3rem;
            margin-bottom: 1rem;
        }

        .stats-title {
            font-size: 1.75rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
        }

        .stats-subtitle {
            color: var(--text-secondary);
            font-size: 1rem;
        }

        .period-tabs {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 2rem;
            background: var(--bg-card);
            padding: 0.5rem;
            border-radius: var(--radius-lg);
        }

        .period-tab {
            flex: 1;
            padding: 0.75rem;
            border: none;
            background: transparent;
            color: var(--text-secondary);
            border-radius: var(--radius-md);
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .period-tab.active {
            background: var(--gradient-main);
            color: white;
        }

        .leaderboard {
            background: var(--bg-card);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: var(--radius-lg);
            padding: 1.5rem;
            margin-bottom: 2rem;
        }

        .leaderboard-item {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 1rem;
            background: rgba(102, 126, 234, 0.05);
            border-radius: var(--radius-md);
            margin-bottom: 0.75rem;
            transition: all 0.3s ease;
        }

        .leaderboard-item:hover {
            background: rgba(102, 126, 234, 0.1);
            transform: translateX(4px);
        }

        .leaderboard-rank {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 1.125rem;
            flex-shrink: 0;
        }

        .leaderboard-rank.gold {
            background: linear-gradient(135deg, #FFD700, #FFA500);
            color: white;
        }

        .leaderboard-rank.silver {
            background: linear-gradient(135deg, #C0C0C0, #808080);
            color: white;
        }

        .leaderboard-rank.bronze {
            background: linear-gradient(135deg, #CD7F32, #8B4513);
            color: white;
        }

        .leaderboard-rank.regular {
            background: var(--bg-glass);
            color: var(--text-primary);
        }

        .leaderboard-avatar {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            background: var(--gradient-main);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.25rem;
            flex-shrink: 0;
        }

        .leaderboard-info {
            flex: 1;
        }

        .leaderboard-name {
            font-weight: 600;
            margin-bottom: 0.25rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .leaderboard-badge {
            font-size: 1rem;
        }

        .leaderboard-stats {
            color: var(--text-secondary);
            font-size: 0.875rem;
        }

        .leaderboard-amount {
            font-weight: 700;
            font-size: 1.125rem;
            background: var(--gradient-main);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .summary-cards {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .summary-card {
            background: var(--bg-card);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: var(--radius-lg);
            padding: 1.5rem;
            text-align: center;
        }

        .summary-icon {
            font-size: 2rem;
            margin-bottom: 0.75rem;
        }

        .summary-value {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            background: var(--gradient-main);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .summary-label {
            color: var(--text-secondary);
            font-size: 0.875rem;
        }
    </style>
</head>
<body>
    <div class="stats-container">
        <div class="stats-header">
            <div class="stats-icon">📊</div>
            <h1 class="stats-title" data-i18n="stats_title">Savdo statistikasi</h1>
            <p class="stats-subtitle" data-i18n="stats_subtitle">Kunlik, haftalik va oylik reyting</p>
        </div>

        <div class="period-tabs">
            <button class="period-tab active" data-period="today" onclick="switchPeriod('today')" data-i18n="stats_today">Bugun</button>
            <button class="period-tab" data-period="week" onclick="switchPeriod('week')" data-i18n="stats_week">Bu hafta</button>
            <button class="period-tab" data-period="month" onclick="switchPeriod('month')" data-i18n="stats_month">Bu oy</button>
        </div>

        <div class="summary-cards">
            <div class="summary-card">
                <div class="summary-icon">💰</div>
                <div class="summary-value" id="total-sales">0 so'm</div>
                <div class="summary-label" data-i18n="stats_total_sales">Jami savdo</div>
            </div>
            <div class="summary-card">
                <div class="summary-icon">👥</div>
                <div class="summary-value" id="total-users">0</div>
                <div class="summary-label" data-i18n="stats_total_users">Foydalanuvchilar</div>
            </div>
        </div>

        <div class="leaderboard">
            <h2 class="section-title" data-i18n="stats_top_buyers">Top xaridorlar</h2>
            <div id="leaderboard-list">
                <!-- Leaderboard items will be loaded here -->
            </div>
        </div>
    </div>

    <!-- Bottom Navigation -->
    <nav class="bottom-nav">
        <button class="nav-item" onclick="window.location.href='../index.html'">
            <i class="fas fa-home"></i>
            <span data-i18n="nav_home">Asosiy</span>
        </button>
        <button class="nav-item" onclick="window.location.href='orders.html'">
            <i class="fas fa-shopping-bag"></i>
            <span data-i18n="nav_orders">Buyurtmalar</span>
        </button>
        <button class="nav-item active">
            <i class="fas fa-chart-bar"></i>
            <span data-i18n="nav_stats">Statistika</span>
        </button>
        <button class="nav-item" onclick="window.location.href='settings.html'">
            <i class="fas fa-cog"></i>
            <span data-i18n="nav_settings">Sozlamalar</span>
        </button>
    </nav>

    <script src="../js/telegram.js"></script>
    <script src="../js/api.js"></script>
    <script src="../js/i18n.js"></script>
    <script>
        let currentPeriod = 'today';

        function switchPeriod(period) {
            currentPeriod = period;
            document.querySelectorAll('.period-tab').forEach(tab => {
                tab.classList.remove('active');
            });
            document.querySelector(`[data-period="${period}"]`).classList.add('active');
            loadStats();
        }

        async function loadStats() {
            try {
                const response = await api.getStats(currentPeriod);
                
                if (response.success) {
                    const stats = response.data;
                    
                    // Update summary
                    document.getElementById('total-sales').textContent = formatCurrency(stats.total_sales || 0);
                    document.getElementById('total-users').textContent = stats.total_users || 0;
                    
                    // Update leaderboard
                    displayLeaderboard(stats.leaderboard || []);
                }
            } catch (error) {
                console.error('Error loading stats:', error);
                // Show mock data
                displayMockData();
            }
        }

        function displayLeaderboard(leaderboard) {
            const container = document.getElementById('leaderboard-list');
            
            if (leaderboard.length === 0) {
                container.innerHTML = '<div class="empty-state"><p>Ma\'lumot yo\'q</p></div>';
                return;
            }
            
            container.innerHTML = leaderboard.map((user, index) => {
                const rank = index + 1;
                let rankClass = 'regular';
                let badge = '';
                
                if (rank === 1) {
                    rankClass = 'gold';
                    badge = '🥇';
                } else if (rank === 2) {
                    rankClass = 'silver';
                    badge = '🥈';
                } else if (rank === 3) {
                    rankClass = 'bronze';
                    badge = '🥉';
                }
                
                return `
                    <div class="leaderboard-item">
                        <div class="leaderboard-rank ${rankClass}">${rank}</div>
                        <div class="leaderboard-avatar">
                            <i class="fas fa-user"></i>
                        </div>
                        <div class="leaderboard-info">
                            <div class="leaderboard-name">
                                ${user.name || 'User'}
                                ${badge ? `<span class="leaderboard-badge">${badge}</span>` : ''}
                            </div>
                            <div class="leaderboard-stats">${user.orders || 0} buyurtma</div>
                        </div>
                        <div class="leaderboard-amount">${formatCurrency(user.total || 0)}</div>
                    </div>
                `;
            }).join('');
        }

        function displayMockData() {
            const mockData = [
                { name: 'Sodiq', orders: 45, total: 666958 },
                { name: 'Skromniy😱', orders: 32, total: 323195 },
                { name: 'Rahmonov', orders: 28, total: 266538 },
                { name: '😎😎😎', orders: 25, total: 215602 },
                { name: 'Ziynatillo_1', orders: 22, total: 215565 },
                { name: 'uselvissp', orders: 18, total: 160411 },
                { name: 'Axmedov', orders: 15, total: 151034 },
                { name: '🔥', orders: 14, total: 150117 },
                { name: 'Ziyayev', orders: 12, total: 128531 },
                { name: 'Gafarov', orders: 10, total: 108521 },
            ];
            
            document.getElementById('total-sales').textContent = formatCurrency(2386472);
            document.getElementById('total-users').textContent = '156';
            displayLeaderboard(mockData);
        }

        function formatCurrency(amount) {
            return new Intl.NumberFormat('uz-UZ').format(amount) + ' so\'m';
        }

        // Load stats on page load
        document.addEventListener('DOMContentLoaded', () => {
            loadStats();
        });
    </script>
</body>
</html>
