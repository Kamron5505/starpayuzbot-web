<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
  <title data-i18n="settings">Созламалар</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #0a0810;
      --bg-elevated: #120e18;
      --card: #18121f;
      --card-hover: #221a2c;
      --border: rgba(212, 175, 90, 0.1);
      --text: #f5f0e8;
      --text-muted: #9a8fa8;
      --gold: #e4b84a;
      --gold-dim: #b8923a;
      --gold-glow: rgba(228, 184, 74, 0.22);
      --accent: #8b5cf6;
      --accent-warm: #c17f3a;
      --accent-hover: #a78bfa;
      --success: #4ade80;
      --danger: #fb7185;
      --radius: 16px;
      --radius-sm: 12px;
      --safe-bottom: env(safe-area-inset-bottom, 0px);
      --ease-out: cubic-bezier(0.4, 0, 0.2, 1);
      --t-fast: 0.15s var(--ease-out);
      --t-base: 0.28s var(--ease-out);
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      min-height: 100dvh;
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
      padding-bottom: calc(80px + var(--safe-bottom));
    }

    .container {
      max-width: 480px;
      margin: 0 auto;
      padding: 12px 16px 24px;
    }

    .header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 20px;
    }

    .back-btn {
      width: 40px;
      height: 40px;
      border: 1px solid var(--border);
      border-radius: 12px;
      background: var(--card);
      color: var(--text);
      font-size: 20px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background var(--t-base), border-color var(--t-base), transform var(--t-fast);
    }

    .back-btn:active { transform: scale(0.92); }

    .title {
      font-size: 18px;
      font-weight: 800;
    }

    .settings-section {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
      margin-bottom: 16px;
    }

    .settings-section-title {
      font-size: 13px;
      font-weight: 700;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.04em;
      margin-bottom: 12px;
    }

    .settings-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 0;
      border-bottom: 1px solid var(--border);
    }

    .settings-item:last-child {
      border-bottom: none;
    }

    .settings-label {
      font-size: 14px;
      font-weight: 600;
    }

    .language-selector {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 10px;
    }

    .language-option {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      padding: 12px;
      border: 2px solid var(--border);
      border-radius: var(--radius-sm);
      background: var(--bg-elevated);
      cursor: pointer;
      transition: background var(--t-base), border-color var(--t-base), transform var(--t-fast);
    }

    .language-option.active {
      border-color: var(--gold);
      background: rgba(228, 184, 74, 0.08);
    }

    .language-option:active {
      transform: scale(0.96);
    }

    .language-flag {
      font-size: 32px;
    }

    .language-name {
      font-size: 12px;
      font-weight: 700;
      text-align: center;
    }

    .stats-section {
      background: linear-gradient(145deg, rgba(228, 184, 74, 0.1), rgba(139, 92, 246, 0.08));
      border: 1px solid rgba(228, 184, 74, 0.2);
      border-radius: var(--radius);
      padding: 16px;
      margin-bottom: 16px;
    }

    .stats-title {
      font-size: 14px;
      font-weight: 700;
      margin-bottom: 12px;
      color: var(--gold);
    }

    .stat-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 0;
      border-bottom: 1px solid rgba(228, 184, 74, 0.1);
    }

    .stat-item:last-child {
      border-bottom: none;
    }

    .stat-label {
      font-size: 13px;
      color: var(--text-muted);
    }

    .stat-value {
      font-size: 14px;
      font-weight: 700;
      color: var(--gold);
    }

    .loading {
      text-align: center;
      padding: 20px;
      color: var(--text-muted);
    }

    .spinner {
      display: inline-block;
      width: 20px;
      height: 20px;
      border: 2px solid rgba(228, 184, 74, 0.15);
      border-top-color: var(--gold);
      border-radius: 50%;
      animation: spin 0.75s cubic-bezier(0.5, 0, 0.5, 1) infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* Footer Navigation */
    .footer-nav {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: var(--card);
      border-top: 1px solid var(--border);
      display: flex;
      justify-content: space-around;
      align-items: center;
      height: 60px;
      padding-bottom: var(--safe-bottom);
      z-index: 100;
    }

    .nav-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 4px;
      flex: 1;
      height: 60px;
      color: var(--text-muted);
      text-decoration: none;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: color var(--t-base);
    }

    .nav-item.active {
      color: var(--gold);
    }

    .nav-icon {
      font-size: 20px;
    }

    @media (hover: hover) and (pointer: fine) {
      .language-option:hover {
        border-color: rgba(228, 184, 74, 0.35);
        background: var(--card-hover);
      }

      .back-btn:hover {
        background: var(--card-hover);
        border-color: rgba(228, 184, 74, 0.4);
        color: var(--gold);
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <button class="back-btn" onclick="goHome()">
        <i class="fas fa-arrow-left"></i>
      </button>
      <h1 class="title" data-i18n="settingsTitle">Созламалар</h1>
    </div>

    <!-- Language Settings -->
    <div class="settings-section">
      <div class="settings-section-title" data-i18n="language">Тил</div>
      <div class="language-selector">
        <div class="language-option active" data-lang="uz" onclick="changeLanguage('uz')">
          <div class="language-flag">🇺🇿</div>
          <div class="language-name" data-i18n="uzbek">Ўзбек</div>
        </div>
        <div class="language-option" data-lang="ru" onclick="changeLanguage('ru')">
          <div class="language-flag">🇷🇺</div>
          <div class="language-name" data-i18n="russian">Русский</div>
        </div>
        <div class="language-option" data-lang="en" onclick="changeLanguage('en')">
          <div class="language-flag">🇬🇧</div>
          <div class="language-name" data-i18n="english">English</div>
        </div>
      </div>
    </div>

    <!-- Statistics -->
    <div class="stats-section">
      <div class="stats-title" data-i18n="totalAmount">Жами сумма</div>
      <div id="statsContent">
        <div class="loading">
          <div class="spinner"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- Footer Navigation -->
  <div class="footer-nav">
    <a class="nav-item" href="/" onclick="navigateTo('home', event)">
      <i class="nav-icon fas fa-home"></i>
      <span data-i18n="home">Асосий</span>
    </a>
    <a class="nav-item" href="/orders" onclick="navigateTo('orders', event)">
      <i class="nav-icon fas fa-shopping-bag"></i>
      <span data-i18n="orders">Буюртмалар</span>
    </a>
    <a class="nav-item" href="/leaderboard" onclick="navigateTo('leaderboard', event)">
      <i class="nav-icon fas fa-trophy"></i>
      <span data-i18n="leaderboard">Рейтинг</span>
    </a>
    <a class="nav-item active" href="/settings" onclick="navigateTo('settings', event)">
      <i class="nav-icon fas fa-cog"></i>
      <span data-i18n="settings">Созламалар</span>
    </a>
  </div>

  <script src="../js/i18n.js"></script>
  <script>
    function changeLanguage(lang) {
      i18n.setLanguage(lang);
      
      // Update UI
      document.querySelectorAll('.language-option').forEach(opt => {
        opt.classList.remove('active');
      });
      document.querySelector(`[data-lang="${lang}"]`).classList.add('active');
      
      // Update all translations
      i18n.updatePageLanguage();
    }

    async function loadStats() {
      try {
        const response = await fetch('/api/bot/stats');
        const data = await response.json();
        
        if (data.success) {
          renderStats(data.data);
        }
      } catch (error) {
        console.error('Error loading stats:', error);
      }
    }

    function renderStats(stats) {
      const content = document.getElementById('statsContent');
      
      let html = `
        <div class="stat-item">
          <span class="stat-label" data-i18n="totalAmount">Жами сумма</span>
          <span class="stat-value">${formatAmount(stats.totalAmount || 0)}</span>
        </div>
        <div class="stat-item">
          <span class="stat-label" data-i18n="totalUsers">Жами фойдаланувчилар</span>
          <span class="stat-value">${stats.totalUsers || 0}</span>
        </div>
      `;
      
      if (stats.topBuyers && stats.topBuyers.length > 0) {
        html += `
          <div class="stat-item">
            <span class="stat-label" data-i18n="topBuyers">Энг яхши покупатели</span>
            <span class="stat-value">${stats.topBuyers[0].name || 'N/A'}</span>
          </div>
        `;
      }
      
      content.innerHTML = html;
      i18n.updatePageLanguage();
    }

    function formatAmount(amount) {
      return new Intl.NumberFormat('uz-UZ').format(amount) + ' сўм';
    }

    function goHome() {
      window.location.href = '/';
    }

    function navigateTo(page, event) {
      event.preventDefault();
      // Navigation logic here
    }

    // Initialize
    document.addEventListener('DOMContentLoaded', () => {
      i18n.init();
      
      // Set active language option
      const currentLang = i18n.getLanguage();
      document.querySelectorAll('.language-option').forEach(opt => {
        opt.classList.remove('active');
      });
      document.querySelector(`[data-lang="${currentLang}"]`).classList.add('active');
      
      loadStats();
    });
  </script>
</body>
</html>
